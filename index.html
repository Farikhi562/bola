<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07120d" />
  <meta name="description" content="Farikhi Football Universe, game manajer sepak bola PWA." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <title>Farikhi Football Universe</title>
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">FFU</div>
        <div><strong>Farikhi Football</strong><span>Universe 25/26</span></div>
      </div>
      <nav id="mainNav" class="nav-list" aria-label="Navigasi utama"></nav>
      <div class="sidebar-footer">
        <button class="ghost-btn full" id="saveNowBtn">Simpan Sekarang</button>
        <small id="saveStatus">Autosave aktif</small>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <button id="menuBtn" class="icon-btn mobile-only" aria-label="Buka menu">☰</button>
        <div class="club-identity">
          <div class="club-badge" id="clubBadge">PSJ</div>
          <div><strong id="clubName">Persija Jakarta</strong><span id="managerMeta">Muhamad Fauzan Al Farikhi • Pekan 1</span></div>
        </div>
        <div class="top-actions">
          <div class="money-pill" id="moneyPill">Rp0</div>
          <button class="icon-btn" id="soundBtn" aria-label="Efek suara">🔊</button>
          <button class="primary-btn" id="advanceWeekBtn">Lanjut Pekan</button>
        </div>
      </header>
      <section id="view" class="view" aria-live="polite"></section>
    </main>

    <nav class="bottom-nav" id="bottomNav" aria-label="Navigasi bawah"></nav>
  </div>

  <div id="toastHost" class="toast-host" aria-live="polite"></div>
  <div id="modalHost"></div>

  <template id="modalTemplate">
    <div class="modal-backdrop" data-close-modal>
      <section class="modal-card" role="dialog" aria-modal="true">
        <button class="modal-close" data-close-modal aria-label="Tutup">×</button>
        <div class="modal-content"></div>
      </section>
    </div>
  </template>

  <script src="data.js"></script>
  <script src="assets/three.min.js"></script>
  <script src="match3d.js"></script>
  <script src="app.js"></script>
</body>
</html>
