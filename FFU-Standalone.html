<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#090d14" />
  <meta name="description" content="Farikhi Football Universe v6 - Liga 2, promosi degradasi, kompetisi regional, visual pemain dan staf." />
  <title>Farikhi Football Universe v6.0</title>
  
  
  <style>
:root {
  --bg: #070b11;
  --panel: #0e1520;
  --panel-2: #141d2a;
  --panel-3: #1a2535;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --line: #223047;
  --accent: #28d17c;
  --accent-2: #34a5ff;
  --danger: #ff5e6c;
  --warning: #ffbe3d;
  --shadow: 0 18px 50px rgba(0,0,0,.35);
  --radius: 18px;
}
* { box-sizing: border-box; }
html { background: var(--bg); color-scheme: dark; }
body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 10% 0%, rgba(52,165,255,.12), transparent 32%),
    radial-gradient(circle at 90% 10%, rgba(40,209,124,.1), transparent 30%),
    var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
button, input, select, textarea { font: inherit; }
button { cursor: pointer; }
.hidden { display: none !important; }
.topbar {
  position: sticky; top: 0; z-index: 20;
  min-height: 74px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; padding: 12px 22px;
  background: rgba(7,11,17,.9); backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-mark {
  width: 45px; height: 45px; display: grid; place-items: center;
  border-radius: 14px; font-weight: 900; letter-spacing: -.05em;
  color: #03140b; background: linear-gradient(135deg,var(--accent),#b8ffda);
  box-shadow: 0 10px 25px rgba(40,209,124,.23);
}
h1 { margin: 0; font-size: clamp(16px,2vw,22px); }
.brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
.top-actions { display: flex; gap: 8px; }
button, .btn {
  border: 0; border-radius: 12px; padding: 10px 14px;
  color: var(--text); background: var(--panel-3); transition: .18s ease;
}
button:hover { transform: translateY(-1px); filter: brightness(1.08); }
button:disabled { opacity: .45; cursor: not-allowed; transform: none; }
.primary { color: #04130b; background: var(--accent); font-weight: 800; }
.danger { color: #fff; background: var(--danger); }
.warning { color: #211400; background: var(--warning); }
.ghost { background: transparent; border: 1px solid var(--line); }
.small { padding: 7px 10px; font-size: 12px; }
.app-shell { display: grid; grid-template-columns: 230px minmax(0,1fr); }
.sidebar {
  position: sticky; top: 74px; height: calc(100vh - 74px);
  padding: 16px 12px; border-right: 1px solid rgba(255,255,255,.06);
  overflow-y: auto; background: rgba(8,13,20,.7);
}
.nav-item {
  width: 100%; display: flex; align-items: center; gap: 12px;
  margin-bottom: 5px; padding: 11px 13px; text-align: left;
  background: transparent; color: var(--muted); border: 1px solid transparent;
}
.nav-item.active { color: var(--text); background: rgba(40,209,124,.1); border-color: rgba(40,209,124,.2); }
.main-content { min-width: 0; padding: 22px; padding-bottom: 100px; }
.bottom-nav { display: none; }
.page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
.page-head h2 { margin: 0; font-size: clamp(24px,3vw,36px); letter-spacing: -.04em; }
.page-head p { margin: 5px 0 0; color: var(--muted); }
.grid { display: grid; gap: 14px; }
.grid-2 { grid-template-columns: repeat(2,minmax(0,1fr)); }
.grid-3 { grid-template-columns: repeat(3,minmax(0,1fr)); }
.grid-4 { grid-template-columns: repeat(4,minmax(0,1fr)); }
.card {
  background: linear-gradient(180deg,rgba(20,29,42,.94),rgba(12,18,27,.94));
  border: 1px solid rgba(255,255,255,.07); border-radius: var(--radius);
  padding: 16px; box-shadow: var(--shadow);
}
.card h3 { margin: 0 0 12px; font-size: 16px; }
.stat-card strong { display: block; font-size: clamp(23px,3vw,34px); letter-spacing: -.04em; }
.stat-card span { color: var(--muted); font-size: 12px; }
.metric-good { color: var(--accent); }
.metric-bad { color: var(--danger); }
.metric-warn { color: var(--warning); }
.list { display: grid; gap: 9px; }
.list-row {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 11px 12px; border-radius: 13px; background: rgba(255,255,255,.035);
  border: 1px solid rgba(255,255,255,.04);
}
.list-row:hover { border-color: rgba(40,209,124,.25); }
.muted { color: var(--muted); }
.tiny { font-size: 11px; }
.badge {
  display: inline-flex; align-items: center; gap: 5px; padding: 5px 8px;
  border-radius: 99px; background: rgba(52,165,255,.12); color: #8ed1ff;
  font-size: 11px; font-weight: 700;
}
.badge.good { background: rgba(40,209,124,.12); color: #78efa9; }
.badge.bad { background: rgba(255,94,108,.12); color: #ff9aa4; }
.badge.warn { background: rgba(255,190,61,.12); color: #ffd67e; }
.avatar {
  width: 42px; height: 42px; flex: 0 0 auto; display: grid; place-items: center;
  border-radius: 50%; background: linear-gradient(135deg,#23334a,#101824);
  border: 1px solid var(--line); font-weight: 900; color: #cce6ff;
  overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.player-main { display: flex; align-items: center; gap: 10px; min-width: 0; }
.player-main strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.player-main small { color: var(--muted); }
.overall {
  min-width: 42px; height: 42px; display: grid; place-items: center;
  border-radius: 12px; font-weight: 900; background: rgba(40,209,124,.12); color: #78efa9;
}
.progress { height: 7px; border-radius: 99px; background: #070b11; overflow: hidden; }
.progress > i { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg,var(--accent-2),var(--accent)); }
.table-wrap { overflow: auto; border-radius: 14px; }
table { width: 100%; border-collapse: collapse; min-width: 760px; }
th, td { padding: 11px 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,.06); white-space: nowrap; }
th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
td { font-size: 13px; }
tr:hover td { background: rgba(255,255,255,.025); }
.toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 14px; }
input, select, textarea {
  color: var(--text); background: #0a1018; border: 1px solid var(--line);
  border-radius: 11px; padding: 10px 11px; outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(52,165,255,.1); }
.form-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 11px; }
label { display: grid; gap: 6px; font-size: 12px; color: var(--muted); }
.pitch {
  position: relative; min-height: 590px; overflow: hidden; border-radius: 24px;
  background:
    linear-gradient(90deg,transparent 49.7%,rgba(255,255,255,.22) 49.8%,rgba(255,255,255,.22) 50.2%,transparent 50.3%),
    repeating-linear-gradient(90deg,#12713d 0,#12713d 10%,#116937 10%,#116937 20%);
  border: 3px solid rgba(255,255,255,.35);
}
.pitch::before { content:""; position:absolute; inset: 8% 3%; border: 2px solid rgba(255,255,255,.35); }
.pitch::after { content:""; position:absolute; left:50%; top:50%; width:110px; height:110px; transform:translate(-50%,-50%); border:2px solid rgba(255,255,255,.35); border-radius:50%; }
.pitch-slots { position: relative; z-index: 2; min-height: 590px; display: grid; grid-template-rows: repeat(5,1fr); padding: 28px 35px; }
.pitch-line { display:flex; align-items:center; justify-content:space-around; gap:10px; }
.pitch-player {
  width: 94px; padding: 7px; text-align:center; border-radius: 13px;
  background: rgba(4,15,9,.84); border: 1px solid rgba(255,255,255,.25);
  backdrop-filter: blur(5px); cursor: grab;
}
.pitch-player .shirt { width: 36px; height: 36px; margin: 0 auto 4px; display:grid; place-items:center; border-radius: 9px 9px 13px 13px; background: var(--accent); color:#06170d; font-weight:900; }
.pitch-player small { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bench { display:flex; gap:8px; overflow:auto; padding-bottom:4px; }
.bench .pitch-player { flex:0 0 90px; }
.match-console { min-height: 370px; max-height: 480px; overflow-y: auto; padding: 13px; border-radius: 15px; background:#05080d; font-family: ui-monospace,SFMono-Regular,Menlo,monospace; }
.commentary { padding: 7px 0; border-bottom:1px dashed rgba(255,255,255,.08); font-size:13px; }
.commentary strong { color: var(--accent); }
.scoreboard { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:18px; text-align:center; padding:20px; }
.scoreboard .score { font-size: clamp(42px,8vw,78px); font-weight: 950; letter-spacing:-.08em; }
.finance-chart { height: 190px; display:flex; align-items:flex-end; gap:9px; padding-top:20px; }
.finance-bar { flex:1; min-width:25px; border-radius:9px 9px 3px 3px; background:linear-gradient(180deg,var(--accent),rgba(40,209,124,.18)); position:relative; }
.finance-bar span { position:absolute; bottom:calc(100% + 5px); left:50%; transform:translateX(-50%); font-size:9px; color:var(--muted); }
.stars { color: #ffd66b; letter-spacing: 1px; }
.tabbar { display:flex; gap:7px; overflow:auto; margin-bottom:14px; }
.tabbar button.active { background:var(--accent); color:#06170d; font-weight:800; }
.modal-backdrop { position:fixed; inset:0; z-index:50; display:grid; place-items:center; padding:20px; background:rgba(0,0,0,.72); backdrop-filter:blur(8px); }
.modal { width:min(720px,100%); max-height:90vh; overflow:auto; background:var(--panel); border:1px solid var(--line); border-radius:22px; padding:20px; box-shadow:var(--shadow); }
.modal-head { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:14px; }
.modal-head h3 { margin:0; }
.toast { position:fixed; right:20px; bottom:22px; z-index:90; opacity:0; pointer-events:none; transform:translateY(10px); padding:12px 15px; background:#152236; border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); transition:.2s; }
.toast.show { opacity:1; transform:translateY(0); }
.empty { padding:40px 16px; text-align:center; color:var(--muted); }
.kpi-row { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.kpi { padding:11px; border-radius:12px; background:rgba(255,255,255,.035); text-align:center; }
.kpi strong { display:block; font-size:17px; }
.kpi small { color:var(--muted); }
.news-item { border-left:3px solid var(--accent-2); padding-left:12px; }
@media (max-width: 1050px) {
  .grid-4 { grid-template-columns: repeat(2,minmax(0,1fr)); }
  .grid-3 { grid-template-columns: repeat(2,minmax(0,1fr)); }
}
@media (max-width: 760px) {
  .topbar { padding:10px 12px; min-height:66px; }
  .brand h1 { font-size:15px; }
  .brand-mark { width:40px; height:40px; }
  .top-actions .ghost { display:none; }
  .top-actions button { padding:9px 10px; font-size:12px; }
  .app-shell { display:block; }
  .sidebar { display:none; }
  .main-content { padding:15px 12px 92px; }
  .bottom-nav {
    display:grid; grid-template-columns:repeat(5,1fr); position:fixed; left:8px; right:8px; bottom:8px; z-index:30;
    padding:7px; border-radius:18px; background:rgba(14,21,32,.96); border:1px solid var(--line); box-shadow:var(--shadow); backdrop-filter:blur(14px);
  }
  .bottom-nav .nav-item { margin:0; padding:8px 3px; display:grid; justify-items:center; gap:3px; font-size:18px; }
  .bottom-nav .nav-item span { font-size:9px; }
  .grid-4,.grid-3,.grid-2 { grid-template-columns:1fr; }
  .form-grid { grid-template-columns:1fr; }
  .page-head { display:block; }
  .page-head > div:last-child { margin-top:10px; }
  .pitch { min-height:520px; }
  .pitch-slots { min-height:520px; padding:22px 10px; }
  .pitch-player { width:72px; padding:5px; font-size:10px; }
  .pitch-player .shirt { width:29px; height:29px; }
  .scoreboard { gap:5px; padding:10px 0; }
  .kpi-row { grid-template-columns:repeat(2,1fr); }
}


.onboarding-shell { min-height: calc(100vh - 110px); display:grid; place-items:center; padding:20px 0 40px; }
.onboarding-panel { width:min(1180px,100%); }
.club-picker { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; max-height:52vh; overflow:auto; padding:3px; }
.club-choice { text-align:left; border:1px solid var(--line); background:rgba(255,255,255,.035); padding:14px; border-radius:16px; }
.club-choice.selected { border-color:var(--accent); box-shadow:0 0 0 2px rgba(40,209,124,.14); background:rgba(40,209,124,.09); }
.club-choice strong { display:block; font-size:15px; }
.club-choice small { color:var(--muted); }
.club-logo { width:50px;height:50px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(135deg,#26364d,#101824);font-weight:900;margin-bottom:10px; }
.info-box { padding:12px;border-radius:13px;background:rgba(52,165,255,.08);border:1px solid rgba(52,165,255,.18); }
.role-info-grid { display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px; }
.task-pill { display:inline-flex;padding:5px 8px;border-radius:99px;background:rgba(255,190,61,.11);color:#ffd67e;font-size:11px;font-weight:700; }
.source-real { color:#78efa9; }
.source-fiction { color:#ffd67e; }
.national-hero { display:grid;grid-template-columns:120px 1fr;gap:18px;align-items:center; }
.flag-card { min-height:100px;border-radius:20px;display:grid;place-items:center;font-size:42px;background:linear-gradient(135deg,rgba(52,165,255,.14),rgba(40,209,124,.1));border:1px solid var(--line); }
.tactic-controls { display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px; }
@media(max-width:900px){.club-picker{grid-template-columns:repeat(2,minmax(0,1fr));}.tactic-controls{grid-template-columns:repeat(2,minmax(0,1fr));}}
@media(max-width:600px){.club-picker{grid-template-columns:1fr;}.role-info-grid,.tactic-controls{grid-template-columns:1fr;}.national-hero{grid-template-columns:1fr;}}


/* v4: season analytics, live scores, scouting intelligence */
.match-stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.match-stat{background:rgba(255,255,255,.035);border:1px solid var(--line);padding:11px;border-radius:13px;text-align:center}.match-stat span{display:block;color:var(--muted);font-size:11px}.match-stat strong{display:block;font-size:19px;margin-top:3px}.live-score-list{display:grid;gap:8px}.live-score-row{display:grid;grid-template-columns:1fr auto 1fr auto;gap:8px;align-items:center;padding:9px 10px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.025)}.live-score-row .away{text-align:right}.score-chip{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:900;background:#07140f;border:1px solid #1e5f43;border-radius:8px;padding:5px 8px;white-space:nowrap}.rating-pill{display:inline-flex;min-width:42px;justify-content:center;padding:4px 7px;border-radius:8px;font-weight:900;background:#18231e}.rating-pill.elite{background:#123b27;color:#7df0ae}.rating-pill.good{background:#283b19;color:#c8f27a}.rating-pill.average{background:#3c3518;color:#f1d86e}.rating-pill.bad{background:#421e25;color:#ff8996}.trend-up{color:#72e69f}.trend-down{color:#ff7d8a}.trend-flat{color:var(--muted)}.scout-report{border-left:3px solid var(--accent);padding-left:12px}.scout-confidence{font-size:28px;font-weight:900}.season-leader{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:13px}.season-leader .rank{font-size:24px;font-weight:900;color:var(--accent)}.match-event{display:grid;grid-template-columns:45px 1fr;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)}.match-event:last-child{border-bottom:0}.split-stat{display:grid;grid-template-columns:70px 1fr 70px;align-items:center;gap:10px;padding:7px 0}.split-stat .bar{height:7px;border-radius:999px;background:#18211d;overflow:hidden;display:flex}.split-stat .bar i:first-child{background:var(--accent)}.split-stat .bar i:last-child{background:#5a76ff}.fifa-rank{font-size:22px;font-weight:900}.mini-form{display:flex;gap:3px}.mini-form i{width:18px;height:18px;border-radius:5px;display:grid;place-items:center;font-size:10px;font-style:normal;font-weight:900}.mini-form .w{background:#174b30;color:#83f0b1}.mini-form .d{background:#50461b;color:#ffe58a}.mini-form .l{background:#51242a;color:#ff98a2}
@media(max-width:800px){.match-stat-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.live-score-row{grid-template-columns:1fr auto 1fr}.live-score-row button{grid-column:1/-1}.split-stat{grid-template-columns:45px 1fr 45px}}



/* v5: responsive 2D match engine */
.match-layout-v5{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(300px,.82fr);gap:14px;align-items:start}
.match-visual-v5,.match-side-v5{display:grid;gap:14px;min-width:0}
.match-pitch-shell-v5{position:relative;border-radius:22px;padding:10px;background:linear-gradient(180deg,#091710,#07100b);border:1px solid rgba(255,255,255,.1);overflow:hidden;box-shadow:inset 0 0 35px rgba(0,0,0,.35)}
.match-pitch-v5{position:relative;width:100%;aspect-ratio:105/68;min-height:350px;overflow:hidden;border-radius:17px;border:3px solid rgba(255,255,255,.65);background:repeating-linear-gradient(90deg,#14733e 0,#14733e 10%,#116a38 10%,#116a38 20%);isolation:isolate}
.match-pitch-v5::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.025),transparent 40%,rgba(0,0,0,.12));pointer-events:none;z-index:1}
.pitch-halfway-v5{position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(255,255,255,.58);transform:translateX(-50%)}
.pitch-circle-v5{position:absolute;left:50%;top:50%;width:18%;aspect-ratio:1;border:2px solid rgba(255,255,255,.58);border-radius:50%;transform:translate(-50%,-50%)}
.pitch-center-dot-v5{position:absolute;left:50%;top:50%;width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.8);transform:translate(-50%,-50%)}
.pitch-box-v5{position:absolute;top:25%;width:16%;height:50%;border:2px solid rgba(255,255,255,.58)}
.pitch-box-v5.left{left:-2px}.pitch-box-v5.right{right:-2px}
.pitch-six-v5{position:absolute;top:37%;width:6.5%;height:26%;border:2px solid rgba(255,255,255,.58)}
.pitch-six-v5.left{left:-2px}.pitch-six-v5.right{right:-2px}
.pitch-goal-v5{position:absolute;top:42%;width:1.8%;height:16%;border:2px solid rgba(255,255,255,.72);background:rgba(255,255,255,.06)}
.pitch-goal-v5.left{left:0;transform:translateX(-100%)}.pitch-goal-v5.right{right:0;transform:translateX(100%)}
.p2d-v5{position:absolute;left:50%;top:50%;width:34px;height:34px;border-radius:50%;display:grid;place-items:center;transform:translate(-50%,-50%);transition:left .48s linear,top .48s linear,transform .18s ease,box-shadow .18s ease;z-index:5;border:2px solid rgba(255,255,255,.92);font-size:11px;font-weight:950;box-shadow:0 5px 12px rgba(0,0,0,.35);will-change:left,top}
.p2d-v5.home{background:var(--home-color,#28d17c);color:#04140c}.p2d-v5.away{background:var(--away-color,#5a76ff);color:#fff}
.p2d-v5.active{transform:translate(-50%,-50%) scale(1.16);box-shadow:0 0 0 5px rgba(255,255,255,.2),0 7px 18px rgba(0,0,0,.45)}
.p2d-v5 .pname-v5{position:absolute;top:calc(100% + 3px);left:50%;max-width:82px;transform:translateX(-50%);padding:2px 5px;border-radius:6px;background:rgba(2,8,5,.78);color:#fff;font-size:8px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
.ball-v5{position:absolute;left:50%;top:50%;width:13px;height:13px;border-radius:50%;transform:translate(-50%,-50%);background:radial-gradient(circle at 35% 30%,#fff 0 36%,#151515 38% 52%,#fff 54%);z-index:9;box-shadow:0 2px 7px rgba(0,0,0,.55);transition:left .32s linear,top .32s linear,transform .18s ease;will-change:left,top}
.ball-v5.shot{transform:translate(-50%,-50%) scale(1.35)}.ball-v5.goal{animation:goalPulseV5 .7s ease 2}
@keyframes goalPulseV5{50%{transform:translate(-50%,-50%) scale(2.15);filter:drop-shadow(0 0 8px #fff)}}

function calcAttributes(ovr,pos){
  const bias = key => clamp(ovr+rand(-10,10)+(key==='pace'&&['LW','RW','ST','CF'].includes(pos)?5:0),25,99);
  const attrs = {pace:bias('pace'),acceleration:bias('pace'),stamina:bias(),strength:bias(),shooting:bias(),finishing:bias(),longShot:bias(),passing:bias(),crossing:bias(),vision:bias(),dribbling:bias(),control:bias(),technique:bias(),tackling:bias(),marking:bias(),positioning:bias(),heading:bias(),composure:bias(),leadership:bias(),teamwork:bias(),reflexes:bias(),handling:bias()};
  if(pos==='GK'){ attrs.reflexes=clamp(ovr+rand(-3,7),30,99); attrs.handling=clamp(ovr+rand(-5,6),30,99); attrs.shooting=rand(20,45); attrs.dribbling=rand(25,50); }
  if(['CB','RB','LB','RWB','DM'].includes(pos)){ attrs.tackling=clamp(ovr+rand(-2,8),30,99); attrs.marking=clamp(ovr+rand(-3,8),30,99); }
  if(['ST','CF','LW','RW'].includes(pos)){ attrs.finishing=clamp(ovr+rand(-2,8),30,99); attrs.dribbling=clamp(ovr+rand(-3,7),30,99); }
  return attrs;
}
function playerValue(ovr,age,potential){
  const ageFactor = age<=23?1.35:age<=28?1:age<=32?.7:.4;
  const potFactor = 1+Math.max(0,potential-ovr)/80;
  return Math.round(Math.pow(ovr,3)*9000*ageFactor*potFactor/1000000)*1000000;
}

function roundRobin(ids){
  const teams=[...ids]; if(teams.length%2) teams.push(null); const rounds=[]; const n=teams.length;
  for(let r=0;r<n-1;r++){
    const games=[];
    for(let i=0;i<n/2;i++){ const a=teams[i],b=teams[n-1-i]; if(a&&b) games.push({id:uid('fx'),week:r+1,homeId:r%2?a:b,awayId:r%2?b:a,played:false,homeGoals:null,awayGoals:null}); }
    rounds.push(...games); teams.splice(1,0,teams.pop());
  }
  const returnGames=rounds.map(g=>({...g,id:uid('fx'),week:g.week+n-1,homeId:g.awayId,awayId:g.homeId}));
  return [...rounds,...returnGames];
}

}

  clubs.filter(c=>c.league==='Liga 1').forEach((c,i)=>players.push(...generateClubPlayers(c,i)));
  players.push(...seedRealSquads(clubs));

    const formation=['GK','GK','RB','CB','CB','CB','LB','DM','CM','CM','AM','RW','LW','CF','ST','ST'];
    const existing=players.filter(p=>p.clubId===c.id);

      let baseName=`${pick(academyFirst)} ${pick(academyLast)}`,name=baseName,suffix=2;while(usedNames.has(name)){name=`${baseName} ${suffix++}`;}usedNames.add(name);

function loadState(){
  const keys=[APP_KEY,...LEGACY_APP_KEYS_V51];
  for(const key of keys){
    try {
      const raw=storage.getItem(key);
      if(!raw) continue;
      const loaded=JSON.parse(raw);
      if(!loaded||!loaded.version) continue;
      loaded.shortlist=loaded.shortlist||[];
      loaded.compare=loaded.compare||[];
      loaded.training=loaded.training||{focus:'Seimbang',intensity:'Normal',individual:{}};
      loaded.pendingScouting=loaded.pendingScouting||[];
      if(key!==APP_KEY){storage.setItem(APP_KEY,JSON.stringify(loaded));storage.removeItem(key);}
      return loaded;
    } catch(e){ console.warn('Save lama gagal dimigrasikan',key,e); }
  }
  return buildInitialState();
}
function saveState(show=false){ storage.setItem(APP_KEY,JSON.stringify(state)); if(show) toast('Autosave tersimpan. Server imajinasi aman.'); }

function currentTable(league='Liga 1'){
  return (state.tables[league]||[]).slice().sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||club(a.clubId).name.localeCompare(club(b.clubId).name));
}
function nextFixture(){ return state.fixtures.find(f=>f.week>=state.week&&!f.played&&(f.homeId===state.manager.clubId||f.awayId===state.manager.clubId)); }
function potentialLabel(p){
  if(!p.scouted && p.clubId!==state.manager.clubId) return 'Belum di-scout';
  const gap=p.potential-p.ovr;
  if(p.potential>=94) return 'Potensi sangat tinggi';
  if(p.potential>=88) return 'Calon pemain bintang';
  if(gap>=12) return 'Potensi tinggi';
  if(gap>=6) return 'Potensi biasa';
  if(gap>=2) return 'Potensi rendah';
  return 'Tidak punya potensi besar';
}

  return `${pageHead('Match Centre',`${fx.league||managerClub().league} · Minggu ${fx.week} · durasi bisa diatur`,`<select id="match-duration"><option value="30">30 detik</option><option value="60" ${state.settings.matchDuration===60?'selected':''}>1 menit</option><option value="180">3 menit</option><option value="300">5 menit</option></select>`)}

  <div class="grid grid-3" style="margin-top:14px"><div class="card stat-card"><span>Penguasaan</span><strong id="match-possession">50 - 50</strong></div><div class="card stat-card"><span>Tembakan</span><strong id="match-shots">0 - 0</strong></div><div class="card stat-card"><span>xG</span><strong id="match-xg">0.00 - 0.00</strong></div></div>

function teamPower(clubId){ const ps=state.players.filter(p=>p.clubId===clubId).sort((a,b)=>b.ovr-a.ovr).slice(0,11); return ps.reduce((a,p)=>a+p.ovr*(p.stamina/100)*(p.form/100),0)/(ps.length||1); }
function startMatch(){
  const fx=nextFixture(); if(!fx||matchRuntime)return; ensureLineup(); const dur=Number($('#match-duration').value)||60; state.settings.matchDuration=dur;
  matchRuntime={fixtureId:fx.id,minute:0,homeGoals:0,awayGoals:0,homeShots:0,awayShots:0,homeXg:0,awayXg:0,possession:50,paused:false,speed:1,logs:[`<strong>0'</strong> Wasit meniup peluit. Pertandingan dimulai.`],duration:dur,timer:null};
  runMatchTimer(); render();
}
function runMatchTimer(){
  clearInterval(matchRuntime?.timer); if(!matchRuntime)return;
  const tickMs=Math.max(120,(matchRuntime.duration*1000/90)/matchRuntime.speed);
  matchRuntime.timer=setInterval(()=>{ if(!matchRuntime||matchRuntime.paused)return; simulateMinute(); },tickMs);
}
function simulateMinute(){
  const m=matchRuntime,fx=state.fixtures.find(f=>f.id===m.fixtureId); if(!m||!fx)return;
  m.minute++;
  const hp=teamPower(fx.homeId)+(fx.homeId===state.manager.clubId?tacticModifier():0)+3; const ap=teamPower(fx.awayId)+(fx.awayId===state.manager.clubId?tacticModifier():0);
  m.possession=clamp(Math.round(50+(hp-ap)*1.15+rand(-7,7)),31,69);
  const eventChance=.20;
  if(Math.random()<eventChance){
    const homeAttack=Math.random()<(hp/(hp+ap)); const atkId=homeAttack?fx.homeId:fx.awayId; const defId=homeAttack?fx.awayId:fx.homeId; const attackers=state.players.filter(p=>p.clubId===atkId&&['ST','CF','LW','RW','AM','CM'].includes(p.pos)); const shooter=pick(attackers.length?attackers:state.players.filter(p=>p.clubId===atkId));
    const xg=Math.max(.03,Math.min(.7,(shooter?.attributes.finishing||65)/180+Math.random()*.18));
    if(homeAttack){m.homeShots++;m.homeXg+=xg;} else {m.awayShots++;m.awayXg+=xg;}
    const goal=Math.random()<xg*.48;
    if(goal){ if(homeAttack)m.homeGoals++;else m.awayGoals++; if(shooter){shooter.stats.goals++; shooter.morale=clamp(shooter.morale+2,0,100);} logMatch(`<strong>${m.minute}' GOL!</strong> ${shooter?.name||'Pemain'} menaklukkan pertahanan ${club(defId).name}.`); playSound('goal'); }
    else logMatch(`<strong>${m.minute}'</strong> ${shooter?.name||'Pemain'} melepaskan tembakan, tetapi peluang terbuang.`);
  } else if(Math.random()<.05){ logMatch(`<strong>${m.minute}'</strong> Kartu kuning setelah tekel terlambat di tengah lapangan.`); playSound('card'); }
  else if([15,30,45,60,75].includes(m.minute)) logMatch(`<strong>${m.minute}'</strong> Tempo pertandingan ${m.possession>55?'dikuasai tuan rumah':m.possession<45?'condong ke tim tamu':'masih berimbang'}.`);
  updateMatchUI();
  if(m.minute>=90) finishMatch();
}
function tacticModifier(){ let v=0; if(state.tactics.mentality==='Menyerang')v+=2;if(state.tactics.pressing==='Tinggi')v+=1;if(state.tactics.tempo==='Cepat')v+=1; return v; }
function logMatch(text){ matchRuntime.logs.push(text); const el=$('#match-console'); if(el){el.insertAdjacentHTML('beforeend',`<div class="commentary">${text}</div>`);el.scrollTop=el.scrollHeight;} }
function updateMatchUI(){ const m=matchRuntime;if(!m)return; if($('#live-score'))$('#live-score').textContent=`${m.homeGoals}-${m.awayGoals}`;if($('#match-minute'))$('#match-minute').textContent=`${m.minute}'`;if($('#match-possession'))$('#match-possession').textContent=`${m.possession} - ${100-m.possession}`;if($('#match-shots'))$('#match-shots').textContent=`${m.homeShots} - ${m.awayShots}`;if($('#match-xg'))$('#match-xg').textContent=`${m.homeXg.toFixed(2)} - ${m.awayXg.toFixed(2)}`; }
function finishMatch(){
  const m=matchRuntime,fx=state.fixtures.find(f=>f.id===m.fixtureId); clearInterval(m.timer); fx.played=true;fx.homeGoals=m.homeGoals;fx.awayGoals=m.awayGoals; applyResult(fx); state.lastUserMatchWeek=state.week;
  state.news.push({id:uid('n'),week:state.week,title:`${club(fx.homeId).short} ${m.homeGoals}-${m.awayGoals} ${club(fx.awayId).short}`,body:`Pertandingan berakhir dengan xG ${m.homeXg.toFixed(2)}-${m.awayXg.toFixed(2)}.`});
  clubPlayers().forEach(p=>{p.stamina=clamp(p.stamina-rand(3,12),15,100);p.stats.apps++;}); saveState(); logMatch(`<strong>90' SELESAI.</strong> Skor akhir ${m.homeGoals}-${m.awayGoals}.`); playSound('end'); setTimeout(()=>{matchRuntime=null;render();},1800);
}
function playSound(type){
  if(!state.settings.sound)return; try{ const C=window.AudioContext||window.webkitAudioContext;const ctx=new C();const osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=type==='goal'?780:type==='card'?260:440;gain.gain.setValueAtTime(.12,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.35);osc.start();osc.stop(ctx.currentTime+.36);}catch(e){}
}
function applyResult(fx){
  const table=state.tables[club(fx.homeId).league]; if(!table)return; const h=table.find(r=>r.clubId===fx.homeId),a=table.find(r=>r.clubId===fx.awayId); if(!h||!a)return;
  h.p++;a.p++;h.gf+=fx.homeGoals;h.ga+=fx.awayGoals;a.gf+=fx.awayGoals;a.ga+=fx.homeGoals;h.gd=h.gf-h.ga;a.gd=a.gf-a.ga;
  if(fx.homeGoals>fx.awayGoals){h.w++;a.l++;h.pts+=3;}else if(fx.homeGoals<fx.awayGoals){a.w++;h.l++;a.pts+=3;}else{h.d++;a.d++;h.pts++;a.pts++;}
}

function advanceWeek(){
  if(matchRuntime)return toast('Pertandingan lagi jalan. Jangan time travel pas bola masih ditendang.');
  applyStaffWeeklyEffects();
  state.fixtures.filter(f=>f.week===state.week&&!f.played).forEach(f=>{const hp=teamPower(f.homeId)+3,ap=teamPower(f.awayId);const hg=simulateGoals(hp,ap),ag=simulateGoals(ap,hp);f.played=true;f.homeGoals=hg;f.awayGoals=ag;applyResult(f);});
  const intensity=state.training?.intensity||'Normal',focus=state.training?.focus||'Seimbang';const recovery={Ringan:18,Normal:11,Tinggi:5}[intensity];const injuryRisk={Ringan:.003,Normal:.007,Tinggi:.015}[intensity]*staffMedicalRiskModifier();
  state.players.forEach(p=>{
    p.stamina=clamp(p.stamina+rand(Math.max(2,recovery-4),recovery+5),0,100);p.fitness=clamp(p.fitness+rand(3,8),0,100);p.form=clamp(p.form+rand(-4,4),35,99);p.morale=clamp(p.morale+rand(-3,4),25,100);

function applyStaffWeeklyEffects(){
  if(!state.manager.clubId)return;const own=state.staffs.filter(s=>s.clubId===state.manager.clubId),c=managerClub();
  own.forEach(st=>{const q=st.rating/100,task=st.task||defaultStaffTask(st.role);st.lastReport=`Minggu ${state.week}: ${task} berjalan dengan efektivitas ${Math.round(q*100)}%.`;
    if(st.role==='Psikolog Olahraga')clubPlayers().forEach(p=>p.morale=clamp(p.morale+Math.round(q*2),0,100));
    if(st.role==='Fisioterapis')clubPlayers().filter(p=>p.injury&&Math.random()<q*.18).forEach(p=>p.injury.weeks=Math.max(1,p.injury.weeks-1));
    if(st.role==='Manajer Komersial'||st.role==='Manajer Sponsor'){const income=Math.round(c.reputation*st.attributes.commercial*250000);c.balance+=income;state.transactions.push({id:uid('tx'),date:state.date,type:'income',category:'Aktivitas komersial',amount:income,note:`${st.name}: ${task}`});}
    if(st.role==='Scout Lawan'){const fx=nextFixture();if(fx){const opp=club(fx.homeId===c.id?fx.awayId:fx.homeId);st.lastReport=`${opp.name}: power ${teamPower(opp.id).toFixed(1)}, ancaman utama ${state.players.filter(p=>p.clubId===opp.id).sort((a,b)=>b.ovr-a.ovr)[0]?.name||'-'}.`;}}
    if(st.role==='Analis Rekrutmen'&&Math.random()<q*.25){const candidate=state.players.filter(p=>p.clubId!==c.id&&p.age<=24&&p.value<=c.transferBudget*.45).sort((a,b)=>(b.potential-b.ovr)-(a.potential-a.ovr))[0];if(candidate&&!state.shortlist.includes(candidate.id))state.shortlist.push(candidate.id);}
  });

}

  const l1=tableSortV6(state.tables['Liga 1']||[]),barat=liga2RowsV6('Barat'),timur=liga2RowsV6('Timur');if(l1.length<3||barat.length<9||timur.length<9)return;
  const relegatedL1=l1.slice(-3).map(r=>club(r.clubId));const direct=[club(barat[0].clubId),club(timur[0].clubId)];const runners=[club(barat[1].clubId),club(timur[1].clubId)];const playoffWinner=runners.sort((a,b)=>(b.reputation+rand(-8,8))-(a.reputation+rand(-8,8)))[0];const promoted=[...direct,playoffWinner];
  const directDown=[club(barat.at(-1).clubId),club(timur.at(-1).clubId)];const ninth=[club(barat[8].clubId),club(timur[8].clubId)];const playoffDown=ninth.sort((a,b)=>(a.reputation+rand(-8,8))-(b.reputation+rand(-8,8)))[0];const relegatedL2=[...directDown,playoffDown];
  promoted.forEach(c=>{c.league='Liga 1';delete c.group;});relegatedL1.forEach((c,i)=>{c.league=LIGA2_V6;c.group=i%2?'Timur':'Barat';});relegatedL2.forEach(c=>{c.league='Liga Nusantara';c.group=null;});
  const entrants=NUSANTARA_POOL_V6.filter(x=>!state.clubs.some(c=>c.id===x[0]&&c.league===LIGA2_V6)).slice(0,3).map(entrantFromNusantaraV6);rebalanceLiga2GroupsV6();
  state.promotionHistory.push({season:state.season,promoted:promoted.map(c=>c.name),relegatedFromLiga1:relegatedL1.map(c=>c.name),relegatedFromLiga2:relegatedL2.map(c=>c.name),promotedFromNusantara:entrants.map(c=>c.name)});
  const year=Number(state.season.split('/')[0])+1;state.season=`${year}/${year+1}`;state.week=1;state.date=`${year}-07-06`;resetSeasonStatsV6();state.tables={};state.fixtures=[];
  LEAGUES.forEach(l=>{const cs=state.clubs.filter(c=>c.league===l);state.tables[l]=createTable(cs).map(r=>({...r,group:clubGroupV6(r.clubId)}));if(l===LIGA2_V6)state.fixtures.push(...buildLiga2FixturesV6(cs));else state.fixtures.push(...roundRobin(cs.map(c=>c.id)).map(f=>({...f,league:l})));});
  state.regionalCompetitions=buildRegionalCompetitionsV6();state.news.push({id:uid('n'),week:1,title:'Promosi dan degradasi selesai',body:`Promosi Liga 2: ${promoted.map(c=>c.name).join(', ')}. Turun dari Liga 1: ${relegatedL1.map(c=>c.name).join(', ')}.`});toast(`Musim ${state.season} dimulai. Promosi-degradasi beres, akhirnya tabel liga punya konsekuensi.`);
}

const normalizeStateBeforeV6=normalizeStateV51;
normalizeStateV51=function(s){return ensureV6State(normalizeStateBeforeV6(s));};

const sportsDbBeforeV6=sportsDbV51;
async function wikiImageV6(name,suffix=''){const key=`wiki:${name}:${suffix}`;if(visualCacheV51[key])return visualCacheV51[key];try{const title=encodeURIComponent(`${name}${suffix}`.trim().replace(/ /g,'_'));const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${title}`,{mode:'cors'});if(!r.ok)return '';const d=await r.json();const url=d?.thumbnail?.source||d?.originalimage?.source||'';if(url){visualCacheV51[key]=url;try{storage.setItem(VISUAL_CACHE_KEY_V51,JSON.stringify(visualCacheV51))}catch{}}return url;}catch{return '';}}
sportsDbV51=async function(type,name){let url=await sportsDbBeforeV6(type,name);if(!url)url=await wikiImageV6(name,type==='team'?' football club':'');return url||'';};
function staffAvatarV6(s,size='normal'){const fictional=s.isFictional!==false&&String(s.source||'').toLowerCase().includes('fiksi')||(!s.source&&!LIGA2_CLUBS_V6.some(x=>x[10]===s.name));const fallback=`https://api.dicebear.com/9.x/notionists-neutral/svg?seed=${encodeURIComponent(s.name)}`;return `<div class="staff-avatar-v6 ${size==='large'?'large':''}" data-staff-photo="${escapeAttrV51(s.name)}" data-fictional="${fictional?'1':'0'}"><span>${initials(s.name)}</span>${fictional?`<img src="${fallback}" alt="Avatar ${escapeAttrV51(s.name)}" loading="lazy">`:s.imageUrl?`<img src="${escapeAttrV51(s.imageUrl)}" alt="${escapeAttrV51(s.name)}" loading="lazy" onerror="this.remove()">`:''}</div>`;}
staffRow=function staffRowV6(s,own){const info=STAFF_ROLE_INFO[s.role]?.[0]||'Membantu operasional dan performa klub.';return `<tr data-staff-row data-name="${escapeAttrV51((s.name+' '+s.role).toLowerCase())}"><td><div class="staff-main-v6">${staffAvatarV6(s)}<div><strong>${s.name}</strong><small>${s.isFictional===false?'Staf nyata':'Staf fiksi/generatif'}</small></div></div></td><td><strong>${s.role}</strong><small>${info}</small></td><td><span class="stars">${starText(s.stars)}</span></td><td>${s.rating}</td><td>${money(s.salary)}</td><td>${own?`<button class="small" data-staff-info="${s.id}">Info & Tugas</button> <button class="small danger" data-fire-staff="${s.id}">Putus Kontrak</button>`:`<button class="small" data-staff-info="${s.id}">Info</button> <button class="small primary" data-hire-staff="${s.id}">Rekrut</button>`}</td></tr>`;};
renderStaff=function renderStaffV6(){const own=state.staffs.filter(s=>s.clubId===state.manager.clubId).sort((a,b)=>b.stars-a.stars),free=state.staffs.filter(s=>!s.clubId).sort((a,b)=>b.stars-a.stars).slice(0,100),head=own.find(s=>s.role==='Pelatih Kepala');return `${pageHead('Staf & Pelatih','Foto staf nyata disinkronkan dari sumber publik. Staf fiksi memakai avatar generatif dan ditandai jelas, biar nggak pura-pura jadi Pep Guardiola.',`<input id="staff-search" placeholder="Cari role atau nama...">`)}${head?`<section class="card coach-hero-v6"><div class="staff-main-v6">${staffAvatarV6(head,'large')}<div><span class="badge good">Pelatih Kepala</span><h2>${head.name}</h2><p>${STAFF_ROLE_INFO[head.role]?.[0]}</p><div class="toolbar"><span class="stars">${starText(head.stars)}</span><span class="badge">Tugas: ${head.task}</span><span class="badge warn">Beban: ${head.workload}</span></div></div></div></section>`:''}<section class="card" style="margin-top:14px"><h3>Staf Aktif</h3><div class="table-wrap"><table><thead><tr><th>Nama</th><th>Peran & Fungsi</th><th>Bintang</th><th>Rating</th><th>Gaji</th><th>Aksi</th></tr></thead><tbody>${own.map(s=>staffRow(s,true)).join('')}</tbody></table></div></section><section class="card" style="margin-top:14px"><h3>Pasar Staf</h3><div class="table-wrap"><table id="staff-market"><thead><tr><th>Nama</th><th>Peran & Fungsi</th><th>Bintang</th><th>Rating</th><th>Gaji</th><th>Aksi</th></tr></thead><tbody>${free.map(s=>staffRow(s,false)).join('')}</tbody></table></div></section>`;};
function showStaffInfoV6(id){const s=state.staffs.find(x=>x.id===id),info=STAFF_ROLE_INFO[s.role]||['Membantu klub.',[]];modal(s.name,`<div class="staff-detail-v6">${staffAvatarV6(s,'large')}<div><h3>${s.role}</h3><p>${info[0]}</p><div class="list"><div class="list-row"><span>Bintang / Rating</span><strong>${starText(s.stars)} · ${s.rating}</strong></div><div class="list-row"><span>Gaji</span><strong>${money(s.salary)}</strong></div><div class="list-row"><span>Tugas sekarang</span><strong>${s.task}</strong></div><div class="list-row"><span>Laporan</span><strong>${s.lastReport}</strong></div></div></div></div>${s.clubId===state.manager.clubId?`<div class="form-grid" style="margin-top:12px"><label>Berikan tugas<select id="staff-task-v6">${info[1].map(x=>`<option ${x===s.task?'selected':''}>${x}</option>`).join('')}</select></label><label>Beban kerja<select id="staff-workload-v6">${['Ringan','Normal','Tinggi'].map(x=>`<option ${x===s.workload?'selected':''}>${x}</option>`).join('')}</select></label></div>`:''}`,`<button data-close-modal class="ghost">Tutup</button>${s.clubId===state.manager.clubId?'<button id="save-staff-task-v6" class="primary">Simpan Tugas</button>':''}`);if($('#save-staff-task-v6'))$('#save-staff-task-v6').onclick=()=>{s.task=$('#staff-task-v6').value;s.workload=$('#staff-workload-v6').value;s.lastReport=`Tugas ${s.task} aktif mulai minggu ${state.week}.`;saveState();closeModal();render();};hydrateVisualAssetsV6();}

renderNationalTeams=function renderNationalTeamsV6(){const teams=state.nationalTeams||buildNationalTeams(),id=renderNationalTeams.active||'idn',t=teams.find(x=>x.id===id)||teams[0];return `${pageHead('Tim Nasional','Bendera negara, lambang timnas, wajah pelatih, roster, ranking, dan riwayat laga internasional.',`<button id="simulate-national" class="primary">Simulasi Friendly</button>`)}<div class="tabbar">${teams.map(x=>`<button data-national-tab="${x.id}" class="${x.id===t.id?'active':''}">${flagImgV51(x.name,x.name)} ${x.name}</button>`).join('')}</div><section class="card"><div class="national-hero-v6"><div class="national-badge-v6" data-national-logo="${escapeAttrV51(t.name)}"><span>${flagImgV51(t.name,t.name)||t.flag}</span></div><div><h2>${t.name}</h2><p class="muted">FIFA Ranking #${t.rank} · ${t.formation} · ${t.style}</p><div class="coach-strip-v6"><div class="staff-avatar-v6" data-coach-photo="${escapeAttrV51(t.coach)}" data-fictional="${String(t.coach).startsWith('Pelatih')?'1':'0'}"><span>${initials(t.coach)}</span></div><div><strong>${t.coach}</strong><small>Pelatih tim nasional</small></div></div><div class="tiny muted">${t.played} laga · ${t.wins}M ${t.draws}S ${t.losses}K · ${t.gf}-${t.ga}</div></div></div></section><div class="grid grid-2" style="margin-top:14px"><section class="card"><h3>Skuad Timnas</h3><div class="list">${t.roster.map((name,i)=>`<div class="list-row"><div class="player-main"><div class="avatar visual-avatar-v51" data-player-photo="${escapeAttrV51(name)}" data-fictional="0"><span>${initials(name)}</span></div><div><strong>${name}</strong><small>${i<3?'Kiper/Bek':i<8?'Bek/Gelandang':'Gelandang/Penyerang'}</small></div></div><span class="badge">${i+1}</span></div>`).join('')}</div></section><section class="card"><h3>Riwayat Internasional</h3><div class="list">${(state.nationalHistory||[]).filter(h=>h.teamId===t.id||h.opponentId===t.id).slice(-12).reverse().map(h=>`<div class="list-row"><span>${flagImgV51(h.home,h.home)||h.homeFlag} ${h.home} <strong>${h.hg}-${h.ag}</strong> ${h.away} ${flagImgV51(h.away,h.away)||h.awayFlag}</span><small>Minggu ${h.week}</small></div>`).join('')||'<div class="empty">Belum ada laga.</div>'}</div></section></div>`;};

const renderCompetitionsBeforeV6=renderCompetitions;
function liga2TableHtmlV6(group){const rows=liga2RowsV6(group);return `<section class="card"><h3>Grup ${group}</h3><div class="table-wrap"><table><thead><tr><th>#</th><th>Klub</th><th>P</th><th>M</th><th>S</th><th>K</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Zona</th></tr></thead><tbody>${rows.map((r,i)=>{const c=club(r.clubId),zone=i===0?'Promosi langsung':i===1?'Play-off promosi':i===8?'Play-off degradasi':i===9?'Degradasi':'Aman';return `<tr><td>${i+1}</td><td><div class="club-cell-v6">${clubLogoHtmlV51(c)}<strong>${c.name}</strong></div></td><td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td><td>${r.gf}</td><td>${r.ga}</td><td>${r.gd}</td><td><strong>${r.pts}</strong></td><td><span class="badge ${i<2?'good':i>7?'bad':''}">${zone}</span></td></tr>`}).join('')}</tbody></table></div></section>`;}
function regionalRenderV6(){const id=renderCompetitions.regionalId||state.regionalCompetitions[0]?.id,comp=state.regionalCompetitions.find(c=>c.id===id)||state.regionalCompetitions[0],rows=regionalTableSortV6(comp),results=comp.fixtures.filter(f=>f.played).sort((a,b)=>b.week-a.week);return `<div class="tabbar regional-tabs-v6">${state.regionalCompetitions.map(c=>`<button data-regional-id="${c.id}" class="${c.id===comp.id?'active':''}">${c.name}</button>`).join('')}</div><section class="card regional-hero-v6"><div class="competition-logo-v6" data-competition-logo="${escapeAttrV51(comp.name)}"><span>🏆</span></div><div><h2>${comp.name}</h2><p>${comp.region} · ${comp.format}</p><div class="toolbar"><span class="badge">${comp.teams.length} klub</span><span class="badge good">${comp.stage}</span>${comp.champion?`<span class="badge warn">Juara: ${comp.champion}</span>`:''}</div></div></section><div class="grid grid-2" style="margin-top:14px"><section class="card"><h3>Klasemen Regional</h3><div class="table-wrap"><table><thead><tr><th>#</th><th>Klub</th><th>Negara</th><th>P</th><th>GD</th><th>Pts</th></tr></thead><tbody>${rows.map((r,i)=>{const t=comp.teams.find(x=>x.id===r.teamId);return `<tr><td>${i+1}</td><td><div class="club-cell-v6"><div class="club-logo" data-team-logo="${escapeAttrV51(t.name)}"><span>${initials(t.name)}</span></div><strong>${t.name}</strong></div></td><td>${flagImgV51(t.country)} ${t.country}</td><td>${r.p}</td><td>${r.gd}</td><td><strong>${r.pts}</strong></td></tr>`}).join('')}</tbody></table></div></section><section class="card"><h3>Hasil & Jadwal</h3><div class="list">${comp.fixtures.slice().sort((a,b)=>a.week-b.week).slice(0,40).map(f=>{const h=comp.teams.find(t=>t.id===f.homeId),a=comp.teams.find(t=>t.id===f.awayId);return `<div class="list-row"><div><strong>${h?.name}</strong><small>Minggu ${f.week}</small></div><span class="score-chip">${f.played?`${f.hg}-${f.ag}`:'VS'}</span><div style="text-align:right"><strong>${a?.name}</strong><small>${f.played?'Selesai':'Terjadwal'}</small></div></div>`}).join('')}</div></section></div>`;}
renderCompetitions=function renderCompetitionsV6(){const view=renderCompetitions.view||'standings';if(view==='regional')return `${pageHead('Kompetisi Regional','UEFA, AFC, dan ASEAN disimulasikan bersama kompetisi domestik.',`<span class="badge">Musim ${state.season}</span>`)}<div class="tabbar"><button data-comp-view="standings">Domestik</button><button data-comp-view="regional" class="active">Regional</button></div>${regionalRenderV6()}`;const league=renderCompetitions.active||managerClub()?.league||'Liga 1';if(league===LIGA2_V6){const hist=state.promotionHistory.at(-1);return `${pageHead('Pegadaian Championship / Liga 2','Dua grup, triple round robin 27 laga, promosi langsung, play-off promosi, dan degradasi.',`<span class="badge">20 klub · Musim ${state.season}</span>`)}<div class="tabbar"><button data-comp-view="standings" class="active">Domestik</button><button data-comp-view="regional">Regional</button></div><div class="tabbar">${Object.keys(state.tables).map(l=>`<button data-league-tab="${l}" class="${l===league?'active':''}">${l}</button>`).join('')}</div><div class="grid grid-2" style="margin-top:12px">${liga2TableHtmlV6('Barat')}${liga2TableHtmlV6('Timur')}</div><section class="card" style="margin-top:14px"><h3>Aturan Promosi & Degradasi</h3><div class="grid grid-4"><div class="stat-card"><span>Juara Grup</span><strong>2</strong><span>Promosi langsung</span></div><div class="stat-card"><span>Runner-up</span><strong>2</strong><span>Berebut tiket ketiga</span></div><div class="stat-card"><span>Juru Kunci</span><strong>2</strong><span>Turun langsung</span></div><div class="stat-card"><span>Peringkat 9</span><strong>2</strong><span>Play-off degradasi</span></div></div>${hist?`<p class="muted">Riwayat terakhir: promosi ${hist.promoted.join(', ')} · turun ${hist.relegatedFromLiga2.join(', ')}.</p>`:''}</section>`;}
  const html=renderCompetitionsBeforeV6();return html.replace('<div class="tabbar">','<div class="tabbar"><button data-comp-view="regional">Regional</button></div><div class="tabbar">');};

function hydrateVisualAssetsV6(force=false){hydrateVisualAssetsV51(force);document.querySelectorAll('[data-staff-photo],[data-coach-photo]').forEach(async el=>{if(el.querySelector('img')&&!force)return;const name=el.dataset.staffPhoto||el.dataset.coachPhoto;if(el.dataset.fictional==='1'){if(!el.querySelector('img'))setImgV51(el,`https://api.dicebear.com/9.x/notionists-neutral/svg?seed=${encodeURIComponent(name)}`,name);return;}const url=await wikiImageV6(name);setImgV51(el,url,name);});document.querySelectorAll('[data-national-logo]').forEach(async el=>{if(el.querySelector('img')&&!force)return;const name=el.dataset.nationalLogo,url=await wikiImageV6(name,' national football team');setImgV51(el,url,`Lambang ${name}`);});document.querySelectorAll('[data-competition-logo]').forEach(async el=>{if(el.querySelector('img')&&!force)return;const name=el.dataset.competitionLogo,url=await wikiImageV6(name);setImgV51(el,url,name);});}
const hydrateVisualBeforeV6=hydrateVisualAssetsV51;hydrateVisualAssetsV51=function(force=false){hydrateVisualBeforeV6(force);setTimeout(()=>hydrateVisualAssetsV6Extra(force),20);};
function hydrateVisualAssetsV6Extra(force=false){document.querySelectorAll('[data-staff-photo],[data-coach-photo]').forEach(async el=>{if(el.querySelector('img')&&!force)return;const name=el.dataset.staffPhoto||el.dataset.coachPhoto;if(el.dataset.fictional==='1'){setImgV51(el,`https://api.dicebear.com/9.x/notionists-neutral/svg?seed=${encodeURIComponent(name)}`,name);return;}setImgV51(el,await wikiImageV6(name),name);});document.querySelectorAll('[data-national-logo]').forEach(async el=>setImgV51(el,await wikiImageV6(el.dataset.nationalLogo,' national football team'),el.dataset.nationalLogo));document.querySelectorAll('[data-competition-logo]').forEach(async el=>setImgV51(el,await wikiImageV6(el.dataset.competitionLogo),el.dataset.competitionLogo));}

const advanceWeekBeforeV6=advanceWeek;
advanceWeek=function advanceWeekV6(){const old=state.week;advanceWeekBeforeV6();if(state.week===old)return;simulateRegionalWeekV6(old);if(state.week>38)finishSeasonV6();state.version=FFU_V6_VERSION;saveState();render();};
$('#advance-week').onclick=advanceWeek;

function bindV6(){
  $$('[data-regional-id]').forEach(b=>b.onclick=()=>{renderCompetitions.regionalId=b.dataset.regionalId;renderCompetitions.view='regional';render();});
  $$('[data-staff-info]').forEach(b=>b.onclick=()=>showStaffInfoV6(b.dataset.staffInfo));
  hydrateVisualAssetsV6Extra();
}
const renderBeforeV6=render;
render=function renderV6(){state=ensureV6State(state);renderBeforeV6();bindV6();state.version=FFU_V6_VERSION;};

state=ensureV6State(state);saveState();render();
